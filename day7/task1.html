<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2 id="time">clock</h2>
<script>
function clock(){
let currenttime =  new Date() // date method includes date , hours , minutes , years ,months , seconds , days ......etc 
let hours = currenttime.getHours();
let mins= currenttime.getMinutes();
let secs = currenttime.getSeconds();

document.getElementById("time").innerHTML = hours + ":"+mins +":"+ secs ;

}
setInterval(clock,1000);
</script>

    
</body>
</html>
