<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <!-- <h1 style="color: blue"></h1> -->
    <h1>for in loop</h1>
    <div id="demo1"></div>
    <script>
        let student= {
            name: "dipu",
            //key : value 
            age: 25,
            course: "MERN"
        };
     let output ="";
     for(let key in student){
        output += key + ":"+ student[key]+"<br>";
     }
     document.getElementById("demo1").innerHTML = output;
      </script>
</body>
</html>
