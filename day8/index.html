<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2> quiz</h2>
    <p id="question">1. full form of HTML</p>

    <label for="q1a">
        <input type="radio" id="q1a" name="q1" value="1" title="Hypertext Markup Language">
        Hypertext mark up language
    </label><br>

    <label for="q1b">
        <input type="radio" id="q1b" name="q1" value="2" title="Language">
        language
    </label><br>

    <label for="q1c">
        <input type="radio" id="q1c" name="q1" value="3" title="Text Markup Language">
        text mark up language
    </label><br>

    <label for="q1d">
        <input type="radio" id="q1d" name="q1" value="4" title="Markup Language">
        mark up language
    </label><br>

    <button onclick="checkthepaper()"> submit</button>
    <p id="result"></p>
</body>
<script>
function checkthepaper(){
let options = document.getElementsByName("q1");
let choosen ="";
for(let i=0;i<options.length;i++){
if(options[i].checked){
choosen += options[i].value;
}
}       


if(choosen =="1"){
document.getElementById("result").innerHTML ="Correct";
}
else{
document.getElementById("result").innerHTML ="wrong";
}
}

</script>

</html>
